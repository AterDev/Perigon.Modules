<div class="login-container">
  <canvas
  id="starfield"
  >
</canvas>
<mat-card>
  <mat-card-header>
    <mat-card-title> {{i18nKeys.login.login | translate}}
    </mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="loginForm" (ngSubmit)="doLogin()" class="login-form">
      <mat-form-field appearance="outline">
        <mat-label>{{i18nKeys.login.email|translate}}
        </mat-label>
        <input
        matInput
        type="email"
        formControlName="email"
        [placeholder]="i18nKeys.login.emailPlaceholder | translate"
        />
        @if (email.invalid && email.touched) {
          <mat-error>{{i18nKeys.validation.required | translate}}
          </mat-error>
        }
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>{{i18nKeys.login.password|translate}}
        </mat-label>
        <input
        type="password"
        matInput
        [placeholder]="i18nKeys.login.passwordPlaceholder | translate"
        formControlName="password"
        />
        @if (password.invalid && password.touched) {
          <mat-error>{{i18nKeys.validation.required | translate}}
          </mat-error>
        }
      </mat-form-field>
      <div class="login-btn-row">
        <button
        mat-flat-button
        color="primary"
        type="submit"
        [disabled]="loginForm.invalid"
        >
        {{i18nKeys.login.login|translate}}
      </button>
    </div>
  </form>
</mat-card-content>
</mat-card>
</div>
