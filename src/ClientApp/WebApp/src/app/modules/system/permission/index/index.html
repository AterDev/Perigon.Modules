<section class="page">
  <div class="d-flex align-items-center justify-content-between gap-3">
    <div class="d-flex flex-wrap align-items-center gap-3 flex-grow-1">
      <mat-form-field appearance="outline" subscriptSizing="dynamic"
      >
      <mat-label>权限名称</mat-label
        >
        <input
        matInput
        [(ngModel)]="name"
        (keyup.enter)="load()" />
      </mat-form-field
      >
      <button mat-stroked-button (click)="load()">
        <mat-icon>search</mat-icon>查询
        </button>
      </div>
      <a mat-flat-button routerLink="add">
        <mat-icon>add</mat-icon>新增权限</a>
        </div>
        @if (loading()) {
          <mat-spinner diameter="36" />
        }
        @else if (permissions().length === 0) {
          <p class="empty">暂无权限</p>
          }
          @else {
            <div class="table-wrap">
              <table mat-table [dataSource]="permissions()">
                <ng-container matColumnDef="name"
                >
                <th mat-header-cell *matHeaderCellDef>权限名称</th>
                  <td mat-cell *matCellDef="let row">
                    <code>{{ row.name }}
                    </code>
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="description"
                >
                <th mat-header-cell *matHeaderCellDef>说明</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.description || '-' }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="type"
                >
                <th mat-header-cell *matHeaderCellDef>类型值</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.permissionType }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="enabled"
                >
                <th mat-header-cell *matHeaderCellDef>状态</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.enable ? '启用' : '停用' }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="actions"
                >
                <th mat-header-cell *matHeaderCellDef>操作</th>
                  <td mat-cell *matCellDef="let row">
                    <a mat-icon-button [routerLink]="[row.id, 'detail']"
                    >
                    <mat-icon>visibility</mat-icon>
                    </a
                    >
                    <a mat-icon-button [routerLink]="[row.id, 'edit']"
                    >
                    <mat-icon class="primary">edit</mat-icon>
                    </a
                    >
                    <button mat-icon-button (click)="remove(row)">
                      <mat-icon class="error">delete</mat-icon>
                      </button>
                    </td>
                  </ng-container
                  >
                  <tr
                  mat-header-row
                  *matHeaderRowDef="['name','description','type','enabled','actions']"
                  >
                </tr>
                <tr
                mat-row
                *matRowDef="let row; columns: ['name','description','type','enabled','actions'];"
                >
              </tr>
            </table>
          </div>
        }
      </section>
