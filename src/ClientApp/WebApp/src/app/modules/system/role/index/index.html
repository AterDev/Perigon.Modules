<section class="page">
  <div class="d-flex align-items-center justify-content-between gap-3">
    <div class="d-flex flex-wrap align-items-center gap-3 flex-grow-1">
      <mat-form-field appearance="outline" subscriptSizing="dynamic"
      >
      <mat-label>角色名称</mat-label
        >
        <input
        matInput
        [(ngModel)]="name"
        (keyup.enter)="load()" />
      </mat-form-field
      >
      <button mat-stroked-button (click)="load()">
        <mat-icon>search</mat-icon>查询
        </button>
      </div>
      <a mat-flat-button routerLink="add">
        <mat-icon>add</mat-icon>新增角色</a>
        </div>
        @if (loading()) {
          <mat-spinner diameter="36" />
        }
        @else if (roles().length === 0) {
          <p class="empty">暂无角色</p>
          }
          @else {
            <div class="table-wrap">
              <table mat-table [dataSource]="roles()">
                <ng-container matColumnDef="name"
                >
                <th mat-header-cell *matHeaderCellDef>角色名称</th>
                  <td mat-cell *matCellDef="let row">{{ row.name }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="code"
                >
                <th mat-header-cell *matHeaderCellDef>角色标识</th>
                  <td mat-cell *matCellDef="let row">
                    <code>{{ row.nameValue }}
                    </code>
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="system"
                >
                <th mat-header-cell *matHeaderCellDef>类型</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.isSystem ? '系统内置' : '自定义' }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="created"
                >
                <th mat-header-cell *matHeaderCellDef>创建时间</th>
                  <td mat-cell *matCellDef="let row">
                    {{ row.createdTime | date:'yyyy-MM-dd HH:mm' }}
                  </td>
                </ng-container
                >
                <ng-container matColumnDef="actions"
                >
                <th mat-header-cell *matHeaderCellDef>操作</th>
                  <td mat-cell *matCellDef="let row">
                    <a mat-icon-button [routerLink]="[row.id, 'detail']" matTooltip="详情"
                    >
                    <mat-icon>visibility</mat-icon>
                    </a
                    >
                    <a mat-icon-button [routerLink]="[row.id, 'edit']" matTooltip="编辑"
                    >
                    <mat-icon class="primary">edit</mat-icon>
                    </a
                    >
                    <button
                    mat-icon-button
                    [disabled]="row.isSystem"
                    (click)="remove(row)"
                    matTooltip="删除"
                    >
                    <mat-icon class="error">delete</mat-icon>
                    </button>
                  </td>
                </ng-container
                >
                <tr
                mat-header-row
                *matHeaderRowDef="['name','code','system','created','actions']"
                >
              </tr>
              <tr
              mat-row
              *matRowDef="let row; columns: ['name','code','system','created','actions'];"
              >
            </tr>
          </table>
        </div>
      }
    </section>
