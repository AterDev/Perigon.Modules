<section class="page">
  <header>
    <div>
      <h1>文章分类</h1>
      <p>维护文章目录结构</p>
    </div>
    <a mat-flat-button routerLink="add"
      ><mat-icon>create_new_folder</mat-icon>新增分类</a
    >
  </header>
  <div class="filters">
    <mat-form-field appearance="outline"
      ><mat-label>名称</mat-label
      ><input matInput [(ngModel)]="name" /></mat-form-field
    ><button mat-stroked-button (click)="load()">查询</button>
  </div>
  <div class="table-wrap">
    <table mat-table [dataSource]="categories()">
      <ng-container matColumnDef="name"
        ><th mat-header-cell *matHeaderCellDef>名称</th>
        <td mat-cell *matCellDef="let row">{{ row.name }}</td></ng-container
      ><ng-container matColumnDef="level"
        ><th mat-header-cell *matHeaderCellDef>层级</th>
        <td mat-cell *matCellDef="let row">{{ row.level }}</td></ng-container
      ><ng-container matColumnDef="created"
        ><th mat-header-cell *matHeaderCellDef>创建时间</th>
        <td mat-cell *matCellDef="let row">
          {{ row.createdTime | date:'medium' }}
        </td></ng-container
      ><ng-container matColumnDef="actions"
        ><th mat-header-cell *matHeaderCellDef>操作</th>
        <td mat-cell *matCellDef="let row">
          <a mat-icon-button [routerLink]="[row.id, 'detail']"
            ><mat-icon>visibility</mat-icon></a
          ><a mat-icon-button [routerLink]="[row.id, 'edit']"
            ><mat-icon>edit</mat-icon></a
          ><button mat-icon-button (click)="remove(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td></ng-container
      >
      <tr
        mat-header-row
        *matHeaderRowDef="['name','level','created','actions']"
      ></tr>
      <tr
        mat-row
        *matRowDef="let row; columns: ['name','level','created','actions'];"
      ></tr>
    </table>
  </div>
</section>
