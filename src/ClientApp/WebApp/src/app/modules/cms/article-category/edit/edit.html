<section class="page">
  <header><h1>编辑文章分类</h1></header>
  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-form-field appearance="outline"
      ><mat-label>分类名称</mat-label><input matInput formControlName="name"
    /></mat-form-field>
    <div class="actions">
      <button mat-button type="button" routerLink="../../">取消</button
      ><button mat-flat-button type="submit" [disabled]="saving">保存</button>
    </div>
  </form>
</section>
