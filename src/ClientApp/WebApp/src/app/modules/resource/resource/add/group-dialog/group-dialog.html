<h2 mat-dialog-title>{{ i18nKeys.resource.createGroup | translate }}
</h2>
<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="save()">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="w-100">
      <mat-label>{{ i18nKeys.resource.group | translate }}
      </mat-label>
      <input matInput formControlName="name" />
    </mat-form-field>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ i18nKeys.common.cancel | translate }}
  </button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="save()">
    {{ i18nKeys.common.save | translate }}
  </button>
</mat-dialog-actions>
