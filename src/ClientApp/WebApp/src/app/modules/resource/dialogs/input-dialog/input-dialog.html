<h2 mat-dialog-title>{{ data.title }}
</h2>
<mat-dialog-content>
  <form [formGroup]="form" (ngSubmit)="save()" class="d-flex flex-column gap-3">
    @for (field of data.fields; track field.key) {
      <mat-form-field appearance="outline" subscriptSizing="dynamic">
        <mat-label>{{ field.label }}
        </mat-label>
        <input matInput [formControlName]="field.key" />
      </mat-form-field>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>{{ i18nKeys.common.cancel | translate }}
  </button>
  <button mat-flat-button color="primary" type="button" [disabled]="form.invalid" (click)="save()">
    {{ i18nKeys.common.confirm | translate }}
  </button>
</mat-dialog-actions>
